<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>STRIKE REVERSI | 無料オンライン対戦リバーシ</title>
  <meta name="description" content="インストール不要！ブラウザですぐ遊べる無料リバーシ。AI対戦・オンライン対戦対応。最強AIレイラに挑戦しよう。">
  <meta property="og:title" content="STRIKE REVERSI">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta property="og:image" content="https://nikuq-tamago.github.io/Reversi/assets/ogp.jpg">
  
  <style>
    body { margin: 0; font-family: sans-serif; background: #0f172a; color: #fff; line-height: 1.6; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    
    /* ヒーローセクション（PC・スマホ共通のベース設定） */
    .hero-wrap { 
      position: relative; 
      width: 100%; 
      max-height: 85vh;    /* ★トップ画像を大きくするため、75vhから85vhに拡大 */
      margin-bottom: 80px; /* ★PC画面でSTORYを見切れないように下に強く押し下げる（余白を拡大） */
      text-align: center;
    }
    
    .hero-img { 
      width: 100%; 
      max-height: 85vh;    /* ★画像自体の最大高さ制限も85vhに拡大 */
      object-fit: contain; /* 画像を一切削らず、比率を保ったまま全体を表示 */
      display: block; 
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      margin: 0 auto;     /* 中央寄せ */
    }
    
    /* タイトル文字の配置（PC用） */
    .hero-title { 
      position: absolute; 
      top: 6%; /* 画像が大きくなったのに合わせて少し上に微調整 */
      left: 50%; 
      transform: translateX(-50%);
      width: 90%; 
      font-size: 2.2rem; 
      font-weight: 800; 
      color: #fff;
      text-shadow: 0 4px 10px rgba(0,0,0,0.8); 
      margin: 0;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* GAME STARTボタンの配置（PC用） */
    .btn-start { 
      position: absolute; 
      bottom: 6%; /* 画像が大きくなったのに合わせて少し下に微調整 */
      left: 50%; 
      transform: translateX(-50%);
      padding: 14px 35px; 
      font-size: 1.6rem;   
      font-weight: bold;
      background: linear-gradient(135deg, #f59e0b, #ef4444); 
      color: white;
      text-decoration: none; 
      border-radius: 50px; 
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.6); 
      border: 3px solid white;
      white-space: nowrap;
      transition: transform 0.2s;
    }
    .btn-start:hover { transform: translateX(-50%) scale(1.05); }
    
    /* ▼▼▼ スマホ用のメディアクエリ（レスポンシブ設定） ▼▼▼ */
    @media (max-width: 480px) {
      .hero-wrap {
        height: calc(100dvh - 40px); /* スマホ画面いっぱいに広げる */
        max-height: none; 
        margin-bottom: 0; /* スマホ時は100dvhで押し下げるため0でOK */
      }
      .hero-img {
        height: 100%;
        max-height: none;
        object-fit: cover; /* スマホ時は画面に敷き詰めるためcover */
      }
      .hero-title {
        font-size: 1.6rem; /* スマホ用にサイズを縮小（1行化） */
        top: 3%;           /* スマホ時は少し上のほうに配置 */
      }
      .btn-start {
        bottom: 15%;       /* スマホ時はボタンを少し上に配置 */
        padding: 18px 40px;
        font-size: 1.8rem;
      }
    }
    
    /* セクション共通 */
    section { padding: 30px 0; border-top: 1px solid #1e293b; }
    h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
    
    /* キャラクターリスト */
    .char-list { display: grid; gap: 15px; }
    .char-card { background: #1e293b; padding: 10px; border-radius: 10px; display: flex; align-items: center; }
    .char-card img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; object-fit: cover; border: 2px solid #38bdf8; }
  </style>
</head>
<body>

  <div class="container">
    <header class="hero-wrap">
      <img src="assets/main.png" alt="メインビジュアル" class="hero-img">
      <h1 class="hero-title">STRIKE REVERSI</h1>
      <a href="game.html" class="btn-start">GAME START</a>
    </header>

    <section id="story">
      <h2>STORY</h2>
      <p>何者かが、次元の狭間にある盤面「STRIKE REVERSI」を起動し、様々な世界から強烈な個性を持つ挑戦者たちを召喚しました。</p>
      <p>元の世界に戻るには、強者たちが待ち受ける「STRIKE REVERSI」で勝ち抜くしかありません。</p>
      <p>あなたと挑戦者たちの、次元を超えた熱闘がいまはじまります。</p>
    </section>

    <section id="characters">
      <h2>CHARACTERS</h2>
      <div class="char-list">
        <div class="char-card"><img src="assets/chars/kokoro.jpg" alt="こころ"><div><strong>こころ</strong><br><small>初心者見習い</small></div></div>
        <div class="char-card"><img src="assets/chars/ren.jpg" alt="蓮"><div><strong>氷室 蓮</strong><br><small>自称・天才ポーカーフェイス</small></div></div>
        <div class="char-card"><img src="assets/chars/jack.jpg" alt="ジャック"><div><strong>ジャック</strong><br><small>ギャンブラー</small></div></div>
        <div class="char-card"><img src="assets/chars/tetsuma.jpg" alt="鉄馬"><div><strong>豪藤 鉄馬</strong><br><small>熱血筋トレ漢</small></div></div>
        <div class="char-card"><img src="assets/chars/leila.jpg" alt="レイラ"><div><strong>レイラ</strong><br><small>冷徹なる電脳AI</small></div></div>
      </div>
    </section>
  </div>

</body>
</html>
