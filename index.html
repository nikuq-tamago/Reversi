<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>プレミアム・リバーシ</title>
  <link rel="stylesheet" href="styles.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EJL3SSZJYN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EJL3SSZJYN');
  </script>

  <meta name="description" content="ブラウザで無料で遊べるリバーシ（オセロ）。AI対戦対応、スマホ対応。GitHub Pages で公開中。">

  <meta property="og:site_name" content="プレミアム・リバーシ">
  <meta property="og:title" content="プレミアム・リバーシ">
  <meta property="og:description" content="CPU対戦可・スマホ対応。ブラウザですぐに遊べる高品質な無料リバーシゲームです。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nikuq-tamago.github.io/Reversi/">
  <meta property="og:image" content="https://nikuq-tamago.github.io/Reversi/ogp.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="プレミアム・リバーシ">
  <meta name="twitter:description" content="CPU対戦可・スマホ対応。インストール不要ですぐに遊べる本格リバーシ。">
  <meta name="twitter:image" content="https://nikuq-tamago.github.io/Reversi/ogp.png">
</head>
<body>

  <div class="app">
    <header class="header">
      <h1>REVERSI</h1>
      <h5>無料で遊べるリバーシ（オセロ）_AI対戦対応</h5>

      <p class="subtitle" id="subtitle">対戦モードを選択してください</p>
    </header>

    <main class="game-area game-area--hidden" id="game-area">
      <section class="scoreboard" aria-label="スコアボード">
        <div class="player-card" id="card-black">
          <span class="disc disc--black"></span>
          <div class="player-info">
            <span class="player-label" id="label-black">黒</span>
            <span class="player-count" id="count-black">2</span>
          </div>
        </div>

        <div class="turn-indicator">
          <span id="turn-text">あなたの番</span>
          <span class="turn-disc" id="turn-disc"></span>
        </div>

        <div class="player-card" id="card-white">
          <span class="disc disc--white"></span>
          <div class="player-info">
            <span class="player-label" id="label-white">白</span>
            <span class="player-count" id="count-white">2</span>
          </div>
        </div>
      </section>

      <div class="board-wrap">
        <div class="board" id="board" role="grid" aria-label="オセロ盤面"></div>
      </div>

      <div class="message" id="message" role="status" aria-live="polite"></div>

      <div class="controls">
        <button type="button" class="btn btn--secondary" id="btn-hint">置ける場所を表示</button>
        <button type="button" class="btn btn--primary" id="btn-restart">やり直す</button>
      </div>

      <div class="ad-slot" aria-label="広告">

<a href="https://px.a8.net/svt/ejp?a8mat=4B3SN3+E39C6Q+4ZCO+5ZMCH" rel="nofollow">
<img border="0" width="320" height="50" alt="" src="https://www27.a8.net/svt/bgt?aid=260517567852&wid=001&eno=01&mid=s00000023244001006000&mc=1"></a>
<img border="0" width="1" height="1" src="https://www10.a8.net/0.gif?a8mat=4B3SN3+E39C6Q+4ZCO+5ZMCH" alt="">

      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 nikuq tamago Game Project</p>
    </footer>
  </div>

  <dialog class="modal" id="modal-setup" open>
    <div class="modal-content" style="background: #1e293b; color: #f8fafc; padding: 24px; border-radius: 16px; border: 1px solid #475569;">
      <h2 style="font-size: 1.4rem; color: #4ade80; margin-bottom: 20px; text-align: center; font-weight: 800;">ゲーム設定</h2>
      <form id="setup-form">
        
        <div style="margin-bottom: 20px;">
          <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; font-weight: bold;">対戦モード</p>
          <div style="display: flex; gap: 10px;">
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: #334155; padding: 12px; border-radius: 8px; cursor: pointer;">
              <input type="radio" name="mode" value="cpu" checked style="cursor: pointer;"> CPU戦
            </label>
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: #334155; padding: 12px; border-radius: 8px; cursor: pointer;">
              <input type="radio" name="mode" value="pvp" style="cursor: pointer;"> 2人対戦
            </label>
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: #334155; padding: 12px; border-radius: 8px; cursor: pointer;">
              <input type="radio" name="mode" value="online" style="cursor: pointer;"> ネット対戦
            </label>
          </div>
        </div>

        <div id="cpu-level-control" style="margin-bottom: 20px;">
          <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; font-weight: bold;">CPUの強さ</p>
          <div style="display: flex; gap: 8px;">
            <label style="flex: 1; text-align: center; background: #334155; padding: 10px 4px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;">
              <input type="radio" name="level" value="1" style="cursor: pointer;"><br>弱い
            </label>
            <label style="flex: 1; text-align: center; background: #334155; padding: 10px 4px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;">
              <input type="radio" name="level" value="2" checked style="cursor: pointer;"><br>普通
            </label>
            <label style="flex: 1; text-align: center; background: #334155; padding: 10px 4px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;">
              <input type="radio" name="level" value="3" style="cursor: pointer;"><br>強い
            </label>
          </div>
        </div>

        <div style="margin-bottom: 20px;">
          <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; font-weight: bold;">アシスト機能</p>
          <label style="display: flex; align-items: center; justify-content: space-between; background: #334155; padding: 12px; border-radius: 8px; cursor: pointer;">
            <span style="font-size: 0.9rem;">最初から置ける場所を表示する</span>
            <input type="checkbox" id="setup-hint" name="hintInit" style="width: 18px; height: 18px; cursor: pointer;">
          </label>
        </div>

        <div style="margin-bottom: 24px;">
          <p id="color-legend" style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 4px; font-weight: bold;">あなたの色</p>
          <p id="color-hint" style="font-size: 0.75rem; color: #64748b; margin-bottom: 8px;">黒が先手です。</p>
          <div style="display: flex; gap: 10px;">
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: #334155; padding: 12px; border-radius: 8px; cursor: pointer;">
              <input type="radio" name="color" value="black" checked style="cursor: pointer;">
              <span class="disc disc--black"></span> 先手(黒)
            </label>
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: #334155; padding: 12px; border-radius: 8px; cursor: pointer;">
              <input type="radio" name="color" value="white" style="cursor: pointer;">
              <span class="disc disc--white"></span> 後手(白)
            </label>
          </div>
        </div>

        <div id="online-passphrase" style="display:none; margin-bottom: 20px;">
          <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; font-weight: bold;">合言葉（半角英数字）</p>
          <input id="setup-passphrase" name="passphrase" type="text" placeholder="例: amigame123" style="width:100%; padding:12px; border-radius:8px; border: none; background:#0f172a; color:#f8fafc;">
          <p style="font-size:0.75rem; color:#64748b; margin-top:8px;">同じ合言葉を入力した相手と対局します。</p>
        </div>

        <button type="submit" class="btn btn--primary btn--block" style="padding: 14px; font-size: 1rem; box-shadow: 0 4px 12px rgba(59,130,246,0.3);">ゲーム開始</button>
      </form>
    </div>
  </dialog>

  <dialog class="modal" id="modal-gameover">
    <div class="modal-content" style="background: #1e293b; color: #f8fafc; padding: 24px; border-radius: 16px; border: 1px solid #475569; text-align: center;">
      <h2 style="font-size: 1.5rem; color: #facc15; margin-bottom: 12px; font-weight: 800;">対局終了</h2>
      <div id="modal-body" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 20px;"></div>
      
      <div class="ad-slot" style="margin-bottom: 20px;" aria-label="広告">


<a href="https://px.a8.net/svt/ejp?a8mat=4B3SN3+E39C6Q+4ZCO+65ME9" rel="nofollow">
<img border="0" width="300" height="250" alt="" src="https://www20.a8.net/svt/bgt?aid=260517567852&wid=001&eno=01&mid=s00000023244001034000&mc=1"></a>
<img border="0" width="1" height="1" src="https://www10.a8.net/0.gif?a8mat=4B3SN3+E39C6Q+4ZCO+65ME9" alt="">



        
      </div>

      <button type="button" class="btn btn--primary btn--block" id="btn-modal-restart" style="padding: 12px;">もう一度遊ぶ</button>
    </div>
  </dialog>

  <dialog class="modal" id="modal-online-color">
    <div class="modal-content" style="background: #0f172a; color: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align:center;">
      <h3 style="color:#60a5fa; margin-bottom:12px;">合言葉が一致しました — 色を選んでください</h3>
      <p id="online-status" style="color:#94a3b8; margin-bottom:12px;">相手を待っています...</p>
      <div style="display:flex; gap:10px; justify-content:center; margin-bottom:12px;">
        <button id="btn-online-black" class="btn btn--secondary">黒を選ぶ（先手）</button>
        <button id="btn-online-white" class="btn btn--secondary">白を選ぶ（後手）</button>
      </div>
      <div style="display:flex; gap:10px; justify-content:center; margin-bottom:12px;">
        <button type="button" id="btn-online-game-start" class="btn btn--primary" style="display:none;">ゲーム開始</button>
        <button type="button" id="btn-online-cancel" class="btn btn--secondary">キャンセル</button>
      </div>
      <p id="online-instruction" style="font-size:0.85rem; color:#64748b;">両者が異なる色を選択したらゲームが始まります。</p>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.34.0/dist/umd/supabase.js"></script>
  <script src="game.js"></script>
</body>
</html>
